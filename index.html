<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Main Page</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background-color: white;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .header {
            border-bottom: 4px solid red;
            box-shadow: 0px 2px 0px 0px black;
            padding: 20px;
            display: flex;
            justify-content: center;
            position: relative;
        }

        .title {
            font-size: 48px;
            font-weight: bold;
            color: red;
            -webkit-text-stroke: 2px black;
        }

        .login-btn {
            position: absolute;
            bottom: 20px;
            right: 20px;
            color: blue;
            font-size: 16px;
            text-decoration: underline;
            cursor: pointer;
        }

        .main {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .footer {
            border-top: 4px solid red;
            box-shadow: 0px -2px 0px 0px black;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
    </style>
</head>

<body>

    <div class="header">
        <div class="title">Main Page</div>
        <a href="Login.html" class="login-btn">Login</a>
    </div>

    <div class="main">
        <h2>Welcome. Click Login to test authentication.</h2>
    </div>

    <div class="footer">
        <div>Team Footer Area</div>
    </div>

</body>
</html>
