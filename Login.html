<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login</title>
  <link rel="stylesheet" href="common.css"/>
  <link rel="stylesheet" href="login.css"/>
  <script defer src="auth.js"></script>
</head>

<body data-page="login">
  <div class="header">
    <div class="title">Login</div>
  </div>

  <div class="main-box">
    <div class="panel login-wrap">

      <div class="right-form">
        <form id="loginForm">
          <div class="field">
            <label for="loginUsername">User Name</label>
            <input id="loginUsername" type="text" autocomplete="username" />
            <div class="small-note">User Name must be exactly 8 lowercase letters</div>
          </div>

          <div class="field">
            <label for="loginPassword">Password</label>
            <input id="loginPassword" type="password" autocomplete="current-password" />
            <div class="small-note">Password must be exactly 12 characters with atleast 1 lowercase leter, 1 uppercase letter, 1 number, and 1 symbol</div>
          </div>

          <div class="login-actions">
            <button class="btn" type="submit">Login</button>
            <button id="goCreateAccount" class="btn" type="button">Create New Account</button>
          </div>

          <div id="loginMsg" class="message"></div>
        </form>
      </div>

    </div>
  </div>

  <div class="footer">
    <div class="footer-text">Team Site</div>
    <a class="team-link" href="Team.html">Visit Team Page</a>
  </div>
</body>
</html>
